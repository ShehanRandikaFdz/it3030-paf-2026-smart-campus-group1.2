name: Smart Campus CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Test
        working-directory: ./backend
        run: ./mvnw clean verify -DskipTests=false
        env:
          SUPABASE_DB_URL: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?prepareThreshold=0
          SUPABASE_DB_USERNAME: postgres.lcwywqhzfwsjqnusvbhw
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://lcwywqhzfwsjqnusvbhw.supabase.co
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: sb_publishable_wxDSHC20Jm53gWSkDKcGCg_hprqutLK
          VITE_API_BASE_URL: http://localhost:8085
