# Server
server.port=8085

# PostgreSQL (Supabase)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?prepareThreshold=0
spring.datasource.username=postgres.lcwywqhzfwsjqnusvbhw
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Supabase Storage
supabase.url=https://lcwywqhzfwsjqnusvbhw.supabase.co
supabase.service-key=${SUPABASE_SERVICE_KEY}

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
